server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # This is the key line for React Router (client-side routing):
    # if a file isn't found, fall back to index.html so React
    # can handle the route itself
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively — JS/CSS filenames contain
    # a hash so they're safe to cache forever
    location ~* \.(js|css|png|jpg|svg|ico|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
